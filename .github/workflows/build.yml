name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APKs
        run: |
          VERSION_NAME="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION_NAME" = "$GITHUB_REF" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleRelease --no-daemon -PversionName="$VERSION_NAME"
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        run: |
          mv app/build/outputs/apk/release/app-arm64-v8a-release.apk \
             app/build/outputs/apk/release/MotionSound-arm64-v8a-release.apk
          mv app/build/outputs/apk/release/app-armeabi-v7a-release.apk \
             app/build/outputs/apk/release/MotionSound-armeabi-v7a-release.apk

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: MotionSound-arm64-v8a
          path: app/build/outputs/apk/release/MotionSound-arm64-v8a-release.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: MotionSound-armeabi-v7a
          path: app/build/outputs/apk/release/MotionSound-armeabi-v7a-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/MotionSound-arm64-v8a-release.apk
            app/build/outputs/apk/release/MotionSound-armeabi-v7a-release.apk
          generate_release_notes: true
